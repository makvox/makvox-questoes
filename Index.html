<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Makvox Questões</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:        #041E10;
      --bg-card:   #071F12;
      --bg-result: #061A0F;
      --border:    rgba(46, 125, 50, 0.18);
      --border-hi: rgba(46, 125, 50, 0.55);
      --green:     #2E7D32;
      --green-hi:  #43A047;
      --green-glow:#1B5E20;
      --text:      #EDEDED;
      --text-muted:#7A9E7E;
      --text-dim:  #4A7050;
      --font-main: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 1.5rem 6rem;
      position: relative;
      overflow-x: hidden;
    }

    /* ── Subtle grid background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(46,125,50,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(46,125,50,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Top ambient glow ── */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(46,125,50,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Main wrapper ── */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* ── Header / Brand ── */
    header {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 0 3.5rem;
      gap: 1.25rem;
      animation: fadeDown 0.7s ease both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .brand img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      border-radius: 12px;
      filter: drop-shadow(0 0 18px rgba(46,125,50,0.4));
    }

    .brand-name {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
      text-transform: uppercase;
    }

    .brand-name span {
      color: var(--green-hi);
    }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--green-hi);
      background: rgba(46,125,50,0.1);
      border: 1px solid rgba(46,125,50,0.3);
      padding: 0.3rem 0.85rem;
      border-radius: 999px;
      text-transform: uppercase;
      animation: fadeDown 0.7s ease 0.1s both;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--green-hi);
      border-radius: 50%;
      animation: pulse 2.2s ease-in-out infinite;
    }

    /* ── Hero text ── */
    .hero {
      width: 100%;
      text-align: center;
      padding: 0 1rem 3rem;
      animation: fadeDown 0.7s ease 0.15s both;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.1rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
      margin-bottom: 0.9rem;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--green-hi);
    }

    .hero p {
      font-family: var(--font-mono);
      font-size: 0.92rem;
      font-weight: 300;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    /* ── Card / Input zone ── */
    .card {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      box-shadow:
        0 0 0 1px rgba(46,125,50,0.04),
        0 4px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.03);
      animation: fadeUp 0.7s ease 0.25s both;
      transition: border-color 0.3s ease;
    }

    .card:focus-within {
      border-color: var(--border-hi);
      box-shadow:
        0 0 0 1px rgba(46,125,50,0.06),
        0 4px 48px rgba(0,0,0,0.6),
        0 0 24px rgba(46,125,50,0.06),
        inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .card-label {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      background: rgba(4, 16, 8, 0.6);
      border: 1px solid rgba(46,125,50,0.12);
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.7;
      padding: 1.2rem 1.4rem;
      resize: vertical;
      outline: none;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      caret-color: var(--green-hi);
    }

    textarea::placeholder {
      color: var(--text-dim);
      font-style: italic;
    }

    textarea:focus {
      border-color: rgba(46,125,50,0.4);
      box-shadow: 0 0 0 3px rgba(46,125,50,0.08);
    }

    /* ── Button ── */
    .btn-gerar {
      width: 100%;
      padding: 1.05rem 2rem;
      background: var(--green);
      color: #fff;
      font-family: var(--font-main);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition:
        background 0.25s ease,
        transform 0.15s ease,
        box-shadow 0.25s ease;
      box-shadow: 0 4px 20px rgba(46,125,50,0.35);
    }

    .btn-gerar::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .btn-gerar:hover:not(:disabled) {
      background: var(--green-hi);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(46,125,50,0.5);
    }

    .btn-gerar:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-gerar:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Spinner inside button */
    .btn-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
    }

    .spinner {
      display: none;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading .spinner { display: block; }
    .loading .btn-text::after { content: '...'; }

    /* ── Result area ── */
    .result-wrapper {
      width: 100%;
      margin-top: 1.5rem;
      display: none;
      flex-direction: column;
      gap: 0;
      animation: fadeUp 0.5s ease both;
    }

    .result-wrapper.visible {
      display: flex;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(46,125,50,0.08);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      padding: 0.8rem 1.4rem;
    }

    .result-header-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--green-hi);
      text-transform: uppercase;
    }

    .result-header-left svg {
      width: 14px;
      height: 14px;
      fill: var(--green-hi);
    }

    .result-count {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
    }

    #resultado {
      background: var(--bg-result);
      border: 1px solid var(--border);
      border-radius: 0 0 16px 16px;
      padding: 2rem 2rem 2.5rem;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.88rem;
      font-weight: 300;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 120px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }

    /* Error state */
    .result-wrapper.error #resultado {
      color: #EF9A9A;
      border-color: rgba(239, 154, 154, 0.25);
    }

    .result-wrapper.error .result-header {
      background: rgba(239,154,154,0.06);
      border-color: rgba(239, 154, 154, 0.2);
    }

    .result-wrapper.error .result-header-left {
      color: #EF9A9A;
    }

    .result-wrapper.error .result-header-left svg {
      fill: #EF9A9A;
    }

    /* ── Footer ── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 4rem;
      font-family: var(--font-mono);
      font-size: 0.68rem;
      font-weight: 300;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-align: center;
    }

    footer span {
      color: var(--green);
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.85); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--green-glow); border-radius: 4px; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header { padding: 2.8rem 0 2.5rem; }
      .brand img { width: 42px; height: 42px; }
      .brand-name { font-size: 1.25rem; }
      .card { padding: 1.4rem; }
      .hero h1 { font-size: 1.8rem; }
      #resultado { padding: 1.5rem 1.2rem; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

  <div class="wrapper">

    <!-- Header -->
    <header>
      <div class="brand">
        <img id="logoImg" alt="Makvox Logo" />
        <span class="brand-name">MAK<span>VOX</span></span>
      </div>
      <div class="badge">IA · Gerador de Questões ENEM</div>
    </header>

    <!-- Hero -->
    <div class="hero">
      <h1>Makvox <em>Questões</em></h1>
      <p>Gere questões estilo ENEM em segundos</p>
    </div>

    <!-- Input Card -->
    <div class="card">
      <span class="card-label">// Conteúdo de entrada</span>
      <textarea
        id="conteudo"
        placeholder="Cole seu conteúdo aqui..."
        spellcheck="false"
      ></textarea>
      <button class="btn-gerar" id="btnGerar" onclick="gerar()">
        <span class="btn-inner">
          <span class="spinner"></span>
          <span class="btn-text">Gerar questões</span>
        </span>
      </button>
    </div>

    <!-- Result -->
    <div class="result-wrapper" id="resultWrapper">
      <div class="result-header">
        <div class="result-header-left">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
          </svg>
          <span id="resultLabel">Questões geradas</span>
        </div>
        <span class="result-count" id="resultCount"></span>
      </div>
      <pre id="resultado"></pre>
    </div>

  </div>

  <!-- Footer -->
  <footer>
    &copy; 2025 <span>Makvox</span> · Powered by IA
  </footer>

    // ── Gerar questões ──
    async function gerar() {
      const textarea  = document.getElementById('conteudo');
      const btn       = document.getElementById('btnGerar');
      const wrapper   = document.getElementById('resultWrapper');
      const resultado = document.getElementById('resultado');
      const label     = document.getElementById('resultLabel');
      const count     = document.getElementById('resultCount');

      const texto = textarea.value.trim();

      if (!texto) {
        textarea.focus();
        textarea.style.borderColor = 'rgba(239,154,154,0.5)';
        setTimeout(() => { textarea.style.borderColor = ''; }, 1500);
        return;
      }

      // Loading state
      btn.disabled = true;
      btn.classList.add('loading');
      wrapper.classList.remove('visible', 'error');
      resultado.textContent = '';
      label.textContent = 'Questões geradas';
      count.textContent = '';

      try {
        const response = await fetch('http://localhost:3000/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [
              {
                role: 'user',
                content: `Crie 5 questões estilo ENEM com base nisso:\n${texto}`
              }
            ]
          })
        });

        if (!response.ok) {
          throw new Error(`Erro ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();

        // Extrai texto da resposta (adapta para diferentes formatos de API)
        let resposta = '';
        if (typeof data === 'string') {
          resposta = data;
        } else if (data.content) {
          resposta = data.content;
        } else if (data.message) {
          resposta = data.message;
        } else if (data.choices && data.choices[0]) {
          resposta = data.choices[0].message?.content || data.choices[0].text || '';
        } else if (data.response) {
          resposta = data.response;
        } else {
          resposta = JSON.stringify(data, null, 2);
        }

        resultado.textContent = resposta;
        label.textContent = 'Questões geradas';
        count.textContent = '5 questões · ENEM';
        wrapper.classList.add('visible');

      } catch (err) {
        resultado.textContent = `⚠ Não foi possível conectar ao servidor.\n\n${err.message}\n\nVerifique se o servidor está rodando em http://localhost:3000`;
        label.textContent = 'Erro na requisição';
        count.textContent = '';
        wrapper.classList.add('visible', 'error');
      } finally {
        btn.disabled = false;
        btn.classList.remove('loading');

        // Scroll suave para o resultado
        setTimeout(() => {
          wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    }

    // ── Enter para enviar (Ctrl+Enter) ──
    document.getElementById('conteudo').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && e.ctrlKey) {
        gerar();
      }
    });
  </script>
